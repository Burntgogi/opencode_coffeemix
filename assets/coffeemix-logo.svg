<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="coffee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6F4E37"/>
      <stop offset="100%" stop-color="#4A3423"/>
    </linearGradient>
    <linearGradient id="steam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8B7355" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B7355" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Coffee cup body -->
  <rect x="100" y="72" rx="6" ry="6" width="90" height="70" fill="url(#coffee)"/>
  <!-- Cup rim highlight -->
  <rect x="96" y="68" rx="4" ry="4" width="98" height="12" fill="#5C3D2E"/>
  <!-- Cup handle -->
  <path d="M190 88 Q214 88 214 108 Q214 128 190 128" fill="none" stroke="#5C3D2E" stroke-width="8" stroke-linecap="round"/>
  <!-- Coffee surface -->
  <ellipse cx="145" cy="80" rx="40" ry="6" fill="#8B6914" opacity="0.5"/>
  <!-- Saucer -->
  <ellipse cx="145" cy="146" rx="58" ry="10" fill="#5C3D2E"/>
  <ellipse cx="145" cy="144" rx="54" ry="8" fill="#6F4E37"/>

  <!-- Steam wisps -->
  <path d="M125 62 Q122 50 126 40 Q130 30 126 20" fill="none" stroke="url(#steam)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M140 58 Q137 46 141 36 Q145 26 141 16" fill="none" stroke="url(#steam)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M155 62 Q152 50 156 40 Q160 30 156 20" fill="none" stroke="url(#steam)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Lollipop (sticking out of cup) -->
  <line x1="120" y1="72" x2="108" y2="32" stroke="#D4A574" stroke-width="3" stroke-linecap="round"/>
  <circle cx="106" cy="28" r="12" fill="#FF6B9D"/>
  <path d="M100 22 Q106 28 100 34" fill="none" stroke="#FFB3D0" stroke-width="2" stroke-linecap="round"/>
  <path d="M106 18 Q112 24 106 38" fill="none" stroke="#FF4081" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Candy (wrapped, sitting on saucer right) -->
  <ellipse cx="200" cy="138" rx="12" ry="8" fill="#FFD54F"/>
  <path d="M188 138 L180 132 M188 138 L180 144" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M212 138 L220 132 M212 138 L220 144" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="194" y1="134" x2="194" y2="142" stroke="#FFC107" stroke-width="1" opacity="0.6"/>
  <line x1="200" y1="132" x2="200" y2="144" stroke="#FFC107" stroke-width="1" opacity="0.6"/>
  <line x1="206" y1="134" x2="206" y2="142" stroke="#FFC107" stroke-width="1" opacity="0.6"/>

  <!-- Macaron (on saucer left) -->
  <ellipse cx="82" cy="136" rx="14" ry="6" fill="#FFB6C1"/>
  <rect x="68" y="136" width="28" height="5" rx="2" fill="#F8E8D0"/>
  <ellipse cx="82" cy="143" rx="14" ry="6" fill="#FFB6C1"/>

  <!-- Star sparkles (sweet magic) -->
  <g fill="#FFD700" opacity="0.7">
    <polygon points="60,50 62,56 68,56 63,60 65,66 60,62 55,66 57,60 52,56 58,56" transform="scale(0.5) translate(100,60)"/>
    <polygon points="60,50 62,56 68,56 63,60 65,66 60,62 55,66 57,60 52,56 58,56" transform="scale(0.4) translate(520,80)"/>
    <polygon points="60,50 62,56 68,56 63,60 65,66 60,62 55,66 57,60 52,56 58,56" transform="scale(0.35) translate(600,260)"/>
  </g>

  <!-- Text: coffeemix_all -->
  <text x="160" y="172" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600" fill="#6F4E37" letter-spacing="0.5">coffeemix_all</text>
</svg>
